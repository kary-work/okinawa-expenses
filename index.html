<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>沖繩記帳 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f0ede8;--white:#fff;--card:#fff;--border:rgba(0,0,0,0.08);
  --text:#1a1a18;--muted:#7a7870;--accent:#1a5c3a;--accent-light:#e8f5ee;
  --accent2:#c0392b;--ocean:#0a4a6b;--yellow:#f5a623;
  --radius:16px;--radius-sm:10px;--shadow:0 2px 16px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{background:var(--ocean);padding:1.25rem 1.25rem 3.5rem;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:50px;background:var(--bg);clip-path:ellipse(55% 50px at 50% 100%)}
.header-inner{position:relative;z-index:1}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.25rem}
.header h1{font-size:1.3rem;font-weight:700;color:#fff}
.header-sub{font-size:.75rem;color:rgba(255,255,255,.6);letter-spacing:1px}
.header-total-wrap{text-align:right}
.header-jpy{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:700;color:#fff}
.header-twd{font-size:.72rem;color:rgba(255,255,255,.6);margin-top:.1rem}
.budget-bar-wrap{margin-top:1rem}
.budget-label{display:flex;justify-content:space-between;font-size:.72rem;color:rgba(255,255,255,.7);margin-bottom:.4rem}
.budget-bar{height:6px;background:rgba(255,255,255,.2);border-radius:50px;overflow:hidden}
.budget-fill{height:100%;background:#fff;border-radius:50px;transition:width .5s ease}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:.5px solid var(--border);display:flex;z-index:300;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 12px rgba(0,0,0,0.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:.6rem .25rem .5rem;cursor:pointer;font-size:.65rem;color:var(--muted);gap:3px;transition:color .15s}
.nav-item.on{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1;font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif}

/* PAGES */
.page{display:none;padding:1rem}
.page.show{display:block}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.stat-card{background:var(--card);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow)}
.stat-card.wide{grid-column:span 2}
.stat-label{font-size:.7rem;color:var(--muted);margin-bottom:.3rem}
.stat-value{font-size:1.5rem;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.stat-value.accent{color:var(--accent)}
.stat-twd{font-size:.72rem;color:var(--muted);margin-top:.2rem;font-family:'DM Mono',monospace}

/* SECTION */
.section-title{font-size:.8rem;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:1.2rem 0 .6rem}

/* RECORDS */
.record-card{background:var(--card);border-radius:var(--radius-sm);padding:.85rem 1rem;margin-bottom:.5rem;box-shadow:var(--shadow)}
.record-main{display:flex;align-items:center;gap:.75rem}
.record-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.record-info{flex:1;min-width:0}
.record-title{font-size:.88rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-meta{font-size:.72rem;color:var(--muted);margin-top:.15rem}
.record-right{text-align:right;flex-shrink:0}
.record-jpy{font-family:'DM Mono',monospace;font-size:.95rem;font-weight:500}
.record-twd{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace}
.record-who{font-size:.68rem;color:var(--muted);margin-top:.1rem}
.record-day-badge{display:inline-block;font-size:.65rem;padding:.1rem .4rem;border-radius:50px;background:var(--accent-light);color:var(--accent);margin-left:.3rem}
.record-actions{display:flex;gap:.4rem;margin-top:.6rem;justify-content:flex-end}
.rec-btn{padding:.3rem .7rem;border-radius:50px;border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:.72rem;font-family:inherit;transition:all .15s}
.rec-btn.edit{color:var(--ocean);border-color:var(--ocean)}
.rec-btn.del{color:var(--accent2);border-color:var(--accent2)}

/* SCAN */
.scan-area{background:var(--card);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);margin-bottom:1rem}
.upload-btns{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.75rem}
.upload-btn{display:flex;flex-direction:column;align-items:center;gap:.35rem;padding:1.25rem .5rem;border:1.5px dashed rgba(0,0,0,0.15);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;background:transparent;font-family:inherit}
.upload-btn:hover,.upload-btn:active{border-color:var(--accent);background:var(--accent-light)}
.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:100px}
.upload-btn-icon{font-size:1.8rem}
.upload-btn-text{font-size:.78rem;color:var(--muted);text-align:center}
.preview-wrap{margin-bottom:.75rem;display:none}
.preview-img{width:100%;max-height:240px;object-fit:contain;border-radius:var(--radius-sm)}
.preview-meta{font-size:.72rem;color:var(--muted);text-align:center;margin-top:.35rem}
.ai-btn{width:100%;padding:.85rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.95rem;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s}
.ai-btn:disabled{background:#ccc;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.ai-btn.loading .spinner{display:block}
.ai-btn.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULT FORM */
.result-form{background:var(--card);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);margin-top:.75rem;display:none}
.result-form.show{display:block}
.form-row{margin-bottom:.85rem}
.form-row label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;border:.5px solid var(--border);border-radius:8px;padding:.55rem .8rem;font-size:.85rem;font-family:inherit;color:var(--text);background:var(--white);outline:none;transition:border-color .15s;-webkit-appearance:none}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.form-row textarea{resize:none;height:64px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.amount-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;align-items:end}
.twd-preview{background:var(--bg);border-radius:8px;padding:.55rem .8rem;font-size:.85rem;font-family:'DM Mono',monospace;color:var(--muted);text-align:center}

/* WHO / CAT */
.who-grid,.cat-grid{display:flex;gap:.5rem;flex-wrap:wrap}
.who-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .75rem;border-radius:50px;border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .15s}
.who-btn.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.cat-btn{padding:.3rem .7rem;border-radius:50px;border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:.75rem;font-family:inherit;transition:all .15s}
.cat-btn.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.save-btn{width:100%;padding:.8rem;background:var(--ocean);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.5rem}

/* CHARTS */
.chart-card{background:var(--card);border-radius:var(--radius);padding:1.1rem;box-shadow:var(--shadow);margin-bottom:.75rem;overflow:hidden}
.chart-title{font-size:.82rem;font-weight:500;margin-bottom:.75rem}
.chart-wrap{position:relative;width:100%;height:200px;overflow:hidden}
.chart-wrap canvas{display:block;width:100%!important;height:200px!important;max-height:200px}

.day-row{background:var(--card);border-radius:var(--radius-sm);padding:.75rem 1rem;margin-bottom:.5rem;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between}
.day-row-left{font-size:.85rem;font-weight:500}
.day-row-sub{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.day-row-right{text-align:right}
.day-row-jpy{font-family:'DM Mono',monospace;font-weight:500;font-size:.95rem}
.day-row-twd{font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace}

.top-row{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:.5px solid var(--border)}
.top-row:last-child{border-bottom:none}
.top-rank{font-size:.7rem;font-weight:700;color:var(--muted);width:18px;text-align:center;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-name{font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-cat{font-size:.68rem;color:var(--muted)}
.top-right{text-align:right;flex-shrink:0}
.top-jpy{font-family:'DM Mono',monospace;font-size:.85rem;font-weight:500}
.top-twd{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace}

.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:var(--radius);width:100%;max-width:460px;max-height:88vh;overflow-y:auto;padding:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:1rem;font-weight:500;margin-bottom:1.2rem}
.modal-actions{display:flex;gap:.5rem;margin-top:1.2rem}
.btn-primary{flex:1;padding:.6rem;background:var(--ocean);color:#fff;border:none;border-radius:8px;font-size:.85rem;cursor:pointer;font-family:inherit}
.btn-secondary{padding:.6rem 1rem;background:transparent;color:var(--muted);border:.5px solid var(--border);border-radius:8px;font-size:.85rem;cursor:pointer;font-family:inherit}
.btn-danger{padding:.6rem 1rem;background:transparent;color:var(--accent2);border:.5px solid #f5b7b1;border-radius:8px;font-size:.85rem;cursor:pointer;font-family:inherit}

/* SETTINGS */
.setting-row{background:var(--card);border-radius:var(--radius-sm);padding:.85rem 1rem;margin-bottom:.5rem;box-shadow:var(--shadow)}
.setting-row label{font-size:.75rem;color:var(--muted);display:block;margin-bottom:.35rem}
.setting-row input{width:100%;border:.5px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.85rem;font-family:inherit;outline:none;-webkit-appearance:none}
.setting-row input:focus{border-color:var(--accent)}
.person-chip{display:flex;align-items:center;gap:.5rem;background:var(--card);border-radius:var(--radius-sm);padding:.6rem .9rem;margin-bottom:.5rem;box-shadow:var(--shadow)}
.person-chip .pa{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--bg)}
.person-chip .pn{font-size:.85rem;font-weight:500;flex:1}
.person-chip .del{font-size:16px;cursor:pointer;color:var(--muted)}
.export-btn{width:100%;padding:.7rem;border:.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;font-family:inherit;font-size:.85rem;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;gap:.4rem;margin-bottom:.5rem}
.export-btn:hover{background:var(--bg)}

.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:.55rem 1.2rem;border-radius:50px;font-size:.8rem;z-index:999;pointer-events:none;white-space:nowrap;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.toast.show{opacity:1;visibility:visible}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <h1>🌊 沖繩記帳</h1>
        <div class="header-sub">2026.06.05 — 06.09</div>
      </div>
      <div class="header-total-wrap">
        <div class="header-jpy" id="headerTotal">¥0</div>
        <div class="header-twd" id="headerTwd">NT$0</div>
      </div>
    </div>
    <div class="budget-bar-wrap">
      <div class="budget-label"><span>預算使用</span><span id="budgetPct">0%</span></div>
      <div class="budget-bar"><div class="budget-fill" id="budgetFill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<!-- PAGES -->
<div class="page show" id="page-dashboard">
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">今日花費</div>
      <div class="stat-value accent" id="todayJpy">¥0</div>
      <div class="stat-twd" id="todayTwd">NT$0</div>
      <div style="font-size:.7rem;color:var(--muted);margin-top:.2rem" id="todayDay">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">旅程累計</div>
      <div class="stat-value" id="totalJpy">¥0</div>
      <div class="stat-twd" id="totalTwd">NT$0</div>
      <div style="font-size:.7rem;color:var(--muted);margin-top:.2rem" id="recordCount">0 筆</div>
    </div>
    <div class="stat-card wide">
      <div class="stat-label">剩餘預算</div>
      <div class="stat-value" id="budgetLeftJpy">¥0</div>
      <div class="stat-twd" id="budgetLeftTwd">NT$0</div>
      <div style="margin-top:.6rem;height:4px;background:var(--bg);border-radius:50px;overflow:hidden"><div id="dashBudgetBar" style="height:100%;background:var(--accent);border-radius:50px;transition:width .5s"></div></div>
    </div>
  </div>
  <div class="section-title">最近記錄</div>
  <div id="recentList"></div>
</div>

<div class="page" id="page-scan">
  <div class="scan-area">
    <div class="upload-btns">
      <label class="upload-btn">
        <input type="file" accept="image/*" capture="environment" id="fileCamera" onchange="handleImage(event)">
        <div class="upload-btn-icon">📷</div>
        <div class="upload-btn-text">拍照</div>
      </label>
      <label class="upload-btn">
        <input type="file" accept="image/*" id="fileGallery" onchange="handleImage(event)">
        <div class="upload-btn-icon">🖼️</div>
        <div class="upload-btn-text">從相簿選取</div>
      </label>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <img class="preview-img" id="previewImg">
      <div class="preview-meta" id="previewMeta"></div>
    </div>
    <button class="ai-btn" id="aiBtn" onclick="analyzeReceipt()" disabled>
      <div class="spinner"></div>
      <span class="btn-text">✨ AI 辨識收據</span>
    </button>
  </div>

  <div class="result-form" id="resultForm">
    <div class="section-title" style="margin-top:0">辨識結果（可修改）</div>
    <div class="form-2col">
      <div class="form-row"><label>日期</label><input type="date" id="fDate"></div>
      <div class="form-row"><label>時間</label><input type="time" id="fTime"></div>
    </div>
    <div class="form-row"><label>店家名稱</label><input type="text" id="fShop"></div>
    <div class="form-row">
      <label>金額（¥）</label>
      <div class="amount-row">
        <input type="number" id="fAmount" placeholder="0" oninput="updateTwdPreview()">
        <div class="twd-preview" id="twdPreview">NT$ —</div>
      </div>
    </div>
    <div class="form-row"><label>品項說明</label><textarea id="fItems"></textarea></div>
    <div class="form-row"><label>消費類別</label><div class="cat-grid" id="catGrid"></div></div>
    <div class="form-row">
      <label>付款方式</label>
      <select id="fPayment">
        <option value="現金">現金</option>
        <option value="信用卡">信用卡</option>
        <option value="IC卡">IC卡（Suica）</option>
        <option value="PayPay">PayPay</option>
      </select>
    </div>
    <div class="form-row"><label>誰付錢</label><div class="who-grid" id="whoGrid"></div></div>
    <button class="save-btn" onclick="saveRecord()">💾 儲存這筆記錄</button>
  </div>
</div>

<div class="page" id="page-stats"></div>

<div class="page" id="page-records">
  <div id="allRecordsList"></div>
</div>

<div class="page" id="page-settings">
  <div class="section-title">旅行設定</div>
  <div class="setting-row">
    <label>Gemini API Key（用於 AI 辨識收據）</label>
    <div style="display:flex;gap:.5rem">
      <input type="password" id="sGeminiKey" placeholder="AIzaSy..." style="flex:1" oninput="previewKey()">
      <button onclick="saveGeminiKey()" style="padding:.5rem .85rem;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.82rem;white-space:nowrap">儲存</button>
    </div>
    <div id="keyStatus" style="font-size:.72rem;margin-top:.35rem"></div>
    <div style="font-size:.7rem;color:var(--muted);margin-top:.35rem">前往 <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--accent)">aistudio.google.com/apikey</a> 建立免費 Key</div>
  </div>
  <div class="setting-row">
    <label>總預算（¥）</label>
    <input type="number" id="sBudget" placeholder="例：100000" onchange="saveSetting()">
  </div>
  <div class="setting-row">
    <label>日圓匯率（1 JPY = ? TWD，目前約 0.22）</label>
    <input type="number" id="sRate" step="0.001" placeholder="0.22" onchange="saveSetting()">
  </div>
  <div class="section-title">成員管理</div>
  <div id="personList"></div>
  <div style="display:flex;gap:.5rem;margin-bottom:1rem">
    <input type="text" id="newPersonName" placeholder="姓名" style="flex:1;border:.5px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-family:inherit;font-size:.85rem;outline:none;-webkit-appearance:none">
    <input type="text" id="newPersonEmoji" placeholder="頭像" style="width:56px;border:.5px solid var(--border);border-radius:8px;padding:.5rem;font-family:inherit;font-size:.85rem;outline:none;text-align:center;-webkit-appearance:none">
    <button onclick="addPerson()" style="padding:.5rem 1rem;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.85rem">新增</button>
  </div>
  <div class="section-title">資料管理</div>
  <div>
    <button class="export-btn" onclick="exportCSV()">📊 匯出 CSV</button>
    <button class="export-btn" onclick="exportJSON()">💾 備份資料（JSON）</button>
    <label class="export-btn" style="cursor:pointer">📂 還原備份 <input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
    <button class="export-btn" style="color:var(--accent2)" onclick="clearAll()">🗑️ 清除所有記錄</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="modalTitle">編輯記錄</h3>
    <div class="form-2col">
      <div class="form-row"><label>日期</label><input type="date" id="mDate"></div>
      <div class="form-row"><label>時間</label><input type="time" id="mTime"></div>
    </div>
    <div class="form-row"><label>店家名稱</label><input type="text" id="mShop"></div>
    <div class="form-row">
      <label>金額（¥）</label>
      <div class="amount-row">
        <input type="number" id="mAmount" oninput="updateModalTwd()">
        <div class="twd-preview" id="modalTwdPreview">NT$ —</div>
      </div>
    </div>
    <div class="form-row"><label>品項說明</label><textarea id="mItems"></textarea></div>
    <div class="form-row"><label>消費類別</label><div class="cat-grid" id="mCatGrid"></div></div>
    <div class="form-row">
      <label>付款方式</label>
      <select id="mPayment">
        <option value="現金">現金</option>
        <option value="信用卡">信用卡</option>
        <option value="IC卡">IC卡（Suica）</option>
        <option value="PayPay">PayPay</option>
      </select>
    </div>
    <div class="form-row"><label>誰付錢</label><div class="who-grid" id="mWhoGrid"></div></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:320px;text-align:center">
    <div style="font-size:2rem;margin-bottom:.75rem">🗑️</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item on" onclick="showPage('dashboard',this)"><div class="nav-icon">🏠</div>總覽</div>
  <div class="nav-item" onclick="showPage('scan',this)"><div class="nav-icon">📷</div>掃描</div>
  <div class="nav-item" onclick="showPage('stats',this)"><div class="nav-icon">📈</div>統計</div>
  <div class="nav-item" onclick="showPage('records',this)"><div class="nav-icon">📋</div>記錄</div>
  <div class="nav-item" onclick="showPage('settings',this)"><div class="nav-icon">⚙️</div>設定</div>
</div>

<div class="toast" id="toast"></div>

<script>
let GEMINI_KEY = localStorage.getItem('oka_gemini_key') || '';
const TRIP_DAYS = [
  {day:1,date:'2026-06-05',label:'Day 1・那霸'},
  {day:2,date:'2026-06-06',label:'Day 2・北部'},
  {day:3,date:'2026-06-07',label:'Day 3・Parco City'},
  {day:4,date:'2026-06-08',label:'Day 4・南部'},
  {day:5,date:'2026-06-09',label:'Day 5・回程'},
];
const CATEGORIES = ['🍜 餐飲','🛍️ 購物','🚕 交通','🏖️ 景點','🏨 住宿','🍦 甜點','💊 藥妝','🎁 伴手禮','🎡 體驗','📦 其他'];
const CAT_COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#8bc34a'];

let toastTimer=null;
let records=[], persons=[], settings={budget:100000,rate:0.22};
let currentImageB64=null, selectedWho=null, selectedCat=null;
let editingId=null, mSelectedWho=null, mSelectedCat=null;
let chartDaily=null, chartCat=null, chartPay=null;

// ── helpers ──
function jpy2twd(jpy){ return Math.round((jpy||0)*settings.rate); }
function fmtJpy(v){ return '¥'+(v||0).toLocaleString(); }
function fmtTwd(v){ return 'NT$'+jpy2twd(v).toLocaleString(); }

function save(){ localStorage.setItem('oka_records',JSON.stringify(records)); }
function savePersons(){ localStorage.setItem('oka_persons',JSON.stringify(persons)); }
function saveSetting(){
  settings.budget = parseInt(document.getElementById('sBudget').value)||100000;
  settings.rate   = parseFloat(document.getElementById('sRate').value)||0.22;
  localStorage.setItem('oka_settings',JSON.stringify(settings));
  renderAll();
}

// ── init ──
function init(){
  records  = JSON.parse(localStorage.getItem('oka_records')||'[]');
  persons  = JSON.parse(localStorage.getItem('oka_persons')||'[]');
  settings = JSON.parse(localStorage.getItem('oka_settings')||'{"budget":100000,"rate":0.22}');
  if(!settings.rate) settings.rate=0.22;
  if(!persons.length){ persons=[{name:'我',emoji:'😊'},{name:'旅伴',emoji:'🧡'}]; savePersons(); }
  buildCatGrid('catGrid', ()=>selectedCat, v=>{ selectedCat=v; });
  buildCatGrid('mCatGrid', ()=>mSelectedCat, v=>{ mSelectedCat=v; });
  buildWhoGrid('whoGrid', ()=>selectedWho, v=>{ selectedWho=v; });
  buildWhoGrid('mWhoGrid', ()=>mSelectedWho, v=>{ mSelectedWho=v; });
  renderAll();
}

// ── pages ──
function showPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('show');
  el.classList.add('on');
  // dismiss any lingering toast
  clearTimeout(toastTimer);
  document.getElementById('toast').classList.remove('show');
  if(name==='stats') setTimeout(renderCharts,50);
  if(name==='records') renderAllRecords();
  if(name==='settings') renderSettings();
  if(name==='dashboard') renderDashboard();
}

function renderAll(){ renderDashboard(); updateHeader(); }

function updateHeader(){
  const total=records.reduce((s,r)=>s+(r.amount||0),0);
  document.getElementById('headerTotal').textContent=fmtJpy(total);
  document.getElementById('headerTwd').textContent=fmtTwd(total);
  const pct=Math.min(100,Math.round(total/settings.budget*100));
  document.getElementById('budgetPct').textContent=pct+'%';
  document.getElementById('budgetFill').style.width=pct+'%';
}

function renderDashboard(){
  updateHeader();
  const total=records.reduce((s,r)=>s+(r.amount||0),0);
  const today=new Date().toISOString().slice(0,10);
  const todayRecs=records.filter(r=>r.date===today);
  const todayTotal=todayRecs.reduce((s,r)=>s+(r.amount||0),0);
  const dayInfo=TRIP_DAYS.find(d=>d.date===today);
  document.getElementById('todayJpy').textContent=fmtJpy(todayTotal);
  document.getElementById('todayTwd').textContent=fmtTwd(todayTotal);
  document.getElementById('todayDay').textContent=dayInfo?dayInfo.label:'旅遊期間';
  document.getElementById('totalJpy').textContent=fmtJpy(total);
  document.getElementById('totalTwd').textContent=fmtTwd(total);
  document.getElementById('recordCount').textContent=records.length+' 筆記錄';
  const left=Math.max(0,settings.budget-total);
  document.getElementById('budgetLeftJpy').textContent=fmtJpy(left);
  document.getElementById('budgetLeftTwd').textContent=fmtTwd(left);
  const pct=Math.min(100,Math.round(total/settings.budget*100));
  document.getElementById('dashBudgetBar').style.width=pct+'%';
  const recent=[...records].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);
  const el=document.getElementById('recentList');
  if(!recent.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">還沒有記錄，掃描第一張收據吧！</div></div>`;
    return;
  }
  el.innerHTML=recent.map(r=>recordCardHTML(r,false)).join('');
}

function recordCardHTML(r, showActions=true){
  const catIdx=CATEGORIES.findIndex(c=>c===r.category);
  const color=catIdx>=0?CAT_COLORS[catIdx]:'#aaa';
  const dayInfo=TRIP_DAYS.find(d=>d.date===r.date);
  const dayLabel=dayInfo?`<span class="record-day-badge">${dayInfo.label}</span>`:'';
  const person=persons.find(p=>p.name===r.who);
  const avatar=person?person.emoji:'👤';
  const actions=showActions?`<div class="record-actions">
    <button class="rec-btn edit" onclick="openEdit(${r.id})">✏️ 編輯</button>
    <button class="rec-btn del" onclick="deleteRecord(${r.id})">🗑️ 刪除</button>
  </div>`:'';
  return `<div class="record-card">
    <div class="record-main">
      <div class="record-icon" style="background:${color}22">${r.category?r.category.split(' ')[0]:'📦'}</div>
      <div class="record-info">
        <div class="record-title">${r.shop||'未知店家'}${dayLabel}</div>
        <div class="record-meta">${r.date||''} ${r.time||''} · ${r.payment||''}</div>
      </div>
      <div class="record-right">
        <div class="record-jpy">${fmtJpy(r.amount)}</div>
        <div class="record-twd">${fmtTwd(r.amount)}</div>
        <div class="record-who">${avatar} ${r.who||''}</div>
      </div>
    </div>
    ${actions}
  </div>`;
}

// ── image handling with compression ──
function handleImage(e){
  const file=e.target.files[0]; if(!file) return;
  const maxSize=1024;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img2=new Image();
    img2.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img2.width, h=img2.height;
      if(w>maxSize||h>maxSize){
        if(w>h){ h=Math.round(h*maxSize/w); w=maxSize; }
        else{ w=Math.round(w*maxSize/h); h=maxSize; }
      }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img2,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.85);
      currentImageB64=compressed.split(',')[1];
      const previewImg=document.getElementById('previewImg');
      previewImg.src=compressed;
      document.getElementById('previewWrap').style.display='block';
      document.getElementById('previewMeta').textContent=`${w}×${h}px・已壓縮`;
      document.getElementById('aiBtn').disabled=false;
    };
    img2.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  // reset other input
  document.getElementById('fileCamera').value='';
  document.getElementById('fileGallery').value='';
}

// ── AI analysis ──
async function analyzeReceipt(){
  if(!currentImageB64) return;
  if(!GEMINI_KEY||!GEMINI_KEY.startsWith('AIza')){
    showToast('⚠️ 請先到「設定」輸入 Gemini API Key');
    showPage('settings', document.querySelectorAll('.nav-item')[4]);
    return;
  }
  const btn=document.getElementById('aiBtn');
  btn.classList.add('loading'); btn.disabled=true;
  const prompt=`你是一個日本收據辨識助理。請仔細分析這張收據圖片，回傳純 JSON（不含 markdown 代碼塊），欄位如下：
{"shop":"店家名稱翻譯成繁體中文","date":"YYYY-MM-DD（找不到填今天）","time":"HH:MM（找不到填空字串）","amount":總金額數字僅數字，"items":"主要品項繁體中文逗號分隔","category":"從以下選一個：🍜 餐飲/🛍️ 購物/🚕 交通/🏖️ 景點/🏨 住宿/🍦 甜點/💊 藥妝/🎁 伴手禮/🎡 體驗/📦 其他"}
只回傳 JSON 物件，不含任何說明。`;
  const MODELS=['gemini-2.0-flash','gemini-2.5-flash','gemini-2.0-flash-lite'];
  let lastErr=null;
  for(const model of MODELS){
    try{
      showToast('⏳ 嘗試 '+model+'...');
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_KEY}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:'image/jpeg',data:currentImageB64}}]}]})
      });
      const data=await res.json();
      if(!res.ok){
        lastErr=new Error(data?.error?.message||('HTTP '+res.status));
        continue;
      }
      const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
      const cleaned=raw.replace(/```json|```/g,'').trim();
      const json=JSON.parse(cleaned);
      fillForm(json);
      document.getElementById('resultForm').classList.add('show');
      showToast('✅ 辨識完成！請確認資料');
      btn.classList.remove('loading'); btn.disabled=false;
      return;
    } catch(err){
      lastErr=err;
    }
  }
  // all failed — show toast only
  btn.classList.remove('loading'); btn.disabled=false;
  fillForm({});
  document.getElementById('resultForm').classList.add('show');
  showToast('⚠️ 辨識失敗，請手動輸入或稍後再試');
}

function fillForm(d){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('fDate').value=d.date||today;
  document.getElementById('fTime').value=d.time||'';
  document.getElementById('fShop').value=d.shop||'';
  document.getElementById('fAmount').value=d.amount||'';
  document.getElementById('fItems').value=d.items||'';
  selectedCat=d.category||null;
  document.querySelectorAll('#catGrid .cat-btn').forEach(b=>b.classList.toggle('on',b.dataset.cat===selectedCat));
  updateTwdPreview();
}

function updateTwdPreview(){
  const v=parseInt(document.getElementById('fAmount').value)||0;
  document.getElementById('twdPreview').textContent=v?'NT$'+jpy2twd(v).toLocaleString():'NT$ —';
}
function updateModalTwd(){
  const v=parseInt(document.getElementById('mAmount').value)||0;
  document.getElementById('modalTwdPreview').textContent=v?'NT$'+jpy2twd(v).toLocaleString():'NT$ —';
}

function buildCatGrid(gridId, getVal, setVal){
  document.getElementById(gridId).innerHTML=CATEGORIES.map(c=>
    `<button class="cat-btn" data-cat="${c}" onclick="(function(el,v){${setVal.toString().replace('v=>','').replace('{','').replace('}','')}; document.querySelectorAll('#${gridId} .cat-btn').forEach(b=>b.classList.toggle('on',b===el))})(this,'${c}')">${c}</button>`
  ).join('');
}

function buildWhoGrid(gridId, getVal, setVal){
  document.getElementById(gridId).innerHTML=persons.map(p=>
    `<button class="who-btn" data-who="${p.name}" onclick="(function(el,v){${setVal.toString().replace('v=>','').replace('{','').replace('}','')}; document.querySelectorAll('#${gridId} .who-btn').forEach(b=>b.classList.toggle('on',b===el))})(this,'${p.name}')">${p.emoji} ${p.name}</button>`
  ).join('');
  // select first
  const first=document.querySelector(`#${gridId} .who-btn`);
  if(first){ first.classList.add('on'); setVal(first.dataset.who); }
}

// simpler approach — rebuild grids with direct handlers
function rebuildCatGrid(gridId, getCurrent, onSelect){
  const cur=getCurrent();
  document.getElementById(gridId).innerHTML=CATEGORIES.map(c=>
    `<button class="cat-btn${c===cur?' on':''}" data-cat="${c}">${c}</button>`
  ).join('');
  document.querySelectorAll('#'+gridId+' .cat-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      onSelect(b.dataset.cat);
      document.querySelectorAll('#'+gridId+' .cat-btn').forEach(x=>x.classList.toggle('on',x===b));
    });
  });
}
function rebuildWhoGrid(gridId, getCurrent, onSelect){
  document.getElementById(gridId).innerHTML=persons.map(p=>
    `<button class="who-btn" data-who="${p.name}">${p.emoji} ${p.name}</button>`
  ).join('');
  const btns=document.querySelectorAll('#'+gridId+' .who-btn');
  btns.forEach(b=>{
    b.addEventListener('click',()=>{
      onSelect(b.dataset.who);
      btns.forEach(x=>x.classList.toggle('on',x===b));
    });
  });
  // default select
  const cur=getCurrent();
  const match=[...btns].find(b=>b.dataset.who===cur)||btns[0];
  if(match){ match.classList.add('on'); onSelect(match.dataset.who); }
}

function saveRecord(){
  const amount=parseInt(document.getElementById('fAmount').value);
  const shop=document.getElementById('fShop').value.trim();
  if(!shop||!amount){ showToast('請填寫店家名稱和金額'); return; }
  records.unshift({
    id:Date.now(),
    date:document.getElementById('fDate').value,
    time:document.getElementById('fTime').value,
    shop, amount,
    items:document.getElementById('fItems').value,
    category:selectedCat||'📦 其他',
    payment:document.getElementById('fPayment').value,
    who:selectedWho||(persons[0]?.name||'我'),
    createdAt:new Date().toISOString(),
  });
  save(); renderAll();
  document.getElementById('resultForm').classList.remove('show');
  document.getElementById('previewWrap').style.display='none';
  document.getElementById('previewImg').src='';
  document.getElementById('aiBtn').disabled=true;
  currentImageB64=null;
  showToast('✅ 記錄已儲存！');
  showPage('dashboard',document.querySelectorAll('.nav-item')[0]);
}

// ── edit / delete ──
function openEdit(id){
  const r=records.find(x=>x.id===id); if(!r) return;
  editingId=id; mSelectedCat=r.category; mSelectedWho=r.who;
  document.getElementById('mDate').value=r.date||'';
  document.getElementById('mTime').value=r.time||'';
  document.getElementById('mShop').value=r.shop||'';
  document.getElementById('mAmount').value=r.amount||'';
  document.getElementById('mItems').value=r.items||'';
  document.getElementById('mPayment').value=r.payment||'現金';
  updateModalTwd();
  rebuildCatGrid('mCatGrid',()=>mSelectedCat,v=>{mSelectedCat=v;});
  rebuildWhoGrid('mWhoGrid',()=>mSelectedWho,v=>{mSelectedWho=v;});
  document.getElementById('editModal').classList.add('show');
}
function closeModal(){ document.getElementById('editModal').classList.remove('show'); }
function saveEdit(){
  const idx=records.findIndex(x=>x.id===editingId); if(idx<0) return;
  const amount=parseInt(document.getElementById('mAmount').value);
  const shop=document.getElementById('mShop').value.trim();
  if(!shop||!amount){ showToast('請填寫店家名稱和金額'); return; }
  records[idx]={...records[idx], date:document.getElementById('mDate').value, time:document.getElementById('mTime').value, shop, amount, items:document.getElementById('mItems').value, category:mSelectedCat||'📦 其他', payment:document.getElementById('mPayment').value, who:mSelectedWho||(persons[0]?.name||'我')};
  save(); closeModal(); renderAll(); renderAllRecords();
  showToast('✅ 已更新');
}
let pendingDeleteId=null;
function deleteRecord(id){
  const r=records.find(x=>x.id===id); if(!r) return;
  pendingDeleteId=id;
  document.getElementById('deleteModalDesc').textContent=`「${r.shop}」${r.date} ${fmtJpy(r.amount)}`;
  document.getElementById('deleteModal').classList.add('show');
}
function closeDeleteModal(){ document.getElementById('deleteModal').classList.remove('show'); pendingDeleteId=null; }
function confirmDeleteRecord(){
  if(!pendingDeleteId) return;
  records=records.filter(r=>r.id!==pendingDeleteId);
  save(); closeDeleteModal(); renderAll(); renderAllRecords();
  showToast('已刪除');
}

// ── all records ──
function renderAllRecords(){
  const el=document.getElementById('allRecordsList');
  if(!records.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">還沒有任何記錄</div></div>`; return; }
  el.innerHTML=[...records].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(r=>recordCardHTML(r,true)).join('');
}

// ── charts ──
function makeCanvas(wrapperId){
  const wrap=document.getElementById(wrapperId);
  wrap.innerHTML='';
  const c=document.createElement('canvas');
  c.style.cssText='display:block;width:100%;height:200px;max-height:200px';
  c.setAttribute('width', wrap.offsetWidth||320);
  c.setAttribute('height', 200);
  wrap.appendChild(c);
  return c.getContext('2d');
}

function renderCharts(){
  // Inject page structure fresh every time
  document.getElementById('page-stats').innerHTML=`
    <div class="chart-card">
      <div class="chart-title">每日花費趨勢</div>
      <div class="chart-wrap" id="wrapDaily" style="height:200px;overflow:hidden"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">類別佔比</div>
      <div class="chart-wrap" id="wrapCat" style="height:200px;overflow:hidden"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">支付方式分布</div>
      <div class="chart-wrap" id="wrapPay" style="height:200px;overflow:hidden"></div>
    </div>
    <div class="section-title">每日花費</div>
    <div id="dayList"></div>
    <div class="section-title">TOP 10 消費</div>
    <div class="chart-card" id="top10"></div>`;

  [chartDaily,chartCat,chartPay].forEach(c=>{ if(c) c.destroy(); });
  chartDaily=chartCat=chartPay=null;

  const labels=TRIP_DAYS.map(d=>`Day ${d.day}`);
  const vals=TRIP_DAYS.map(d=>records.filter(r=>r.date===d.date).reduce((s,r)=>s+(r.amount||0),0));
  chartDaily=new Chart(makeCanvas('wrapDaily'),{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:'#0a4a6b',borderRadius:8,barPercentage:.6}]},options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'¥'+v.toLocaleString()},grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false}}},responsive:false,maintainAspectRatio:false}});

  const catT={};
  records.forEach(r=>{catT[r.category||'📦 其他']=(catT[r.category||'📦 其他']||0)+(r.amount||0);});
  chartCat=new Chart(makeCanvas('wrapCat'),{type:'doughnut',data:{labels:Object.keys(catT),datasets:[{data:Object.values(catT),backgroundColor:CAT_COLORS.slice(0,Object.keys(catT).length),borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10}}},responsive:false,maintainAspectRatio:false}});

  const payT={};
  records.forEach(r=>{payT[r.payment||'現金']=(payT[r.payment||'現金']||0)+(r.amount||0);});
  chartPay=new Chart(makeCanvas('wrapPay'),{type:'pie',data:{labels:Object.keys(payT),datasets:[{data:Object.values(payT),backgroundColor:['#1a5c3a','#0a4a6b','#c0392b','#f5a623'],borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10}}},responsive:false,maintainAspectRatio:false}});

  document.getElementById('dayList').innerHTML=TRIP_DAYS.map(d=>{
    const t=records.filter(r=>r.date===d.date).reduce((s,r)=>s+(r.amount||0),0);
    const n=records.filter(r=>r.date===d.date).length;
    return `<div class="day-row"><div class="day-row-left">Day ${d.day}<div class="day-row-sub">${n} 筆</div></div><div class="day-row-right"><div class="day-row-jpy">${fmtJpy(t)}</div><div class="day-row-twd">${fmtTwd(t)}</div></div></div>`;
  }).join('');

  const sorted=[...records].sort((a,b)=>(b.amount||0)-(a.amount||0)).slice(0,10);
  const top=document.getElementById('top10');
  if(!sorted.length){top.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">尚無記錄</div></div>`;return;}
  top.innerHTML=sorted.map((r,i)=>`<div class="top-row"><div class="top-rank">${i+1}</div><div class="top-info"><div class="top-name">${r.shop}</div><div class="top-cat">${r.category||''}</div></div><div class="top-right"><div class="top-jpy">${fmtJpy(r.amount)}</div><div class="top-twd">${fmtTwd(r.amount)}</div></div></div>`).join('');
}

// ── settings ──
function saveGeminiKey(){
  const val=document.getElementById('sGeminiKey').value.trim();
  if(!val.startsWith('AIza')){showToast('Key 格式不對，應以 AIza 開頭');return;}
  GEMINI_KEY=val;
  localStorage.setItem('oka_gemini_key',val);
  showKeyStatus();
  showToast('✅ API Key 已儲存');
}
function previewKey(){
  const val=document.getElementById('sGeminiKey').value.trim();
  const el=document.getElementById('keyStatus'); if(!el) return;
  if(val.startsWith('AIza')&&val.length>20) el.innerHTML='<span style="color:var(--accent)">✓ 格式正確</span>';
  else if(val.length>0) el.innerHTML='<span style="color:var(--accent2)">✗ 格式不對</span>';
  else el.innerHTML='';
}
function showKeyStatus(){
  const el=document.getElementById('keyStatus'); if(!el) return;
  if(GEMINI_KEY&&GEMINI_KEY.startsWith('AIza')){
    el.innerHTML='<span style="color:var(--accent)">✓ 已設定（末碼：...'+GEMINI_KEY.slice(-6)+'）</span>';
    document.getElementById('sGeminiKey').placeholder='已設定，輸入新 Key 可更換';
  } else {
    el.innerHTML='<span style="color:var(--accent2)">⚠️ 尚未設定，請先輸入 API Key</span>';
  }
}

function renderSettings(){
  document.getElementById('sBudget').value=settings.budget;
  document.getElementById('sRate').value=settings.rate;
  showKeyStatus();
  renderPersonList();
}
function renderPersonList(){
  document.getElementById('personList').innerHTML=persons.map((p,i)=>
    `<div class="person-chip"><div class="pa">${p.emoji}</div><div class="pn">${p.name}</div><div class="del" onclick="removePerson(${i})">✕</div></div>`
  ).join('');
}
function addPerson(){
  const name=document.getElementById('newPersonName').value.trim();
  const emoji=document.getElementById('newPersonEmoji').value.trim()||'😊';
  if(!name){showToast('請輸入姓名');return;}
  persons.push({name,emoji}); savePersons();
  document.getElementById('newPersonName').value='';
  document.getElementById('newPersonEmoji').value='';
  renderPersonList();
  rebuildWhoGrid('whoGrid',()=>selectedWho,v=>{selectedWho=v;});
}
function removePerson(idx){ persons.splice(idx,1); savePersons(); renderPersonList(); rebuildWhoGrid('whoGrid',()=>selectedWho,v=>{selectedWho=v;}); }

// ── export ──
function exportCSV(){
  const headers=['日期','時間','店家','金額(JPY)','金額(TWD)','類別','品項','付款方式','付款人'];
  const rows=records.map(r=>[r.date,r.time,r.shop,r.amount,jpy2twd(r.amount),r.category,r.items,r.payment,r.who].map(v=>`"${v||''}"`).join(','));
  download('\uFEFF'+[headers.join(','),...rows].join('\n'),'okinawa-records.csv','text/csv');
}
function exportJSON(){ download(JSON.stringify({records,persons,settings},null,2),'okinawa-backup.json','application/json'); }
function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      records=d.records||[]; persons=d.persons||persons; settings=d.settings||settings;
      save(); savePersons(); localStorage.setItem('oka_settings',JSON.stringify(settings));
      renderAll(); renderSettings(); showToast('✅ 備份還原成功');
    } catch{ showToast('⚠️ 檔案格式錯誤'); }
  };
  reader.readAsText(file); e.target.value='';
}
function clearAll(){ document.getElementById('clearModal').classList.add('show'); }
function confirmClearAll(){ records=[]; save(); renderAll(); document.getElementById('clearModal').classList.remove('show'); showToast('已清除所有記錄'); }
function download(content,filename,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=filename; a.click();
}

// ── toast ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

// close modal on overlay click
document.getElementById('editModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById('deleteModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeDeleteModal(); });
document.getElementById('clearModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) document.getElementById('clearModal').classList.remove('show'); });

init();

// rebuild grids after init (simpler approach)
setTimeout(()=>{
  rebuildCatGrid('catGrid',()=>selectedCat,v=>{selectedCat=v;});
  rebuildWhoGrid('whoGrid',()=>selectedWho,v=>{selectedWho=v;});
},0);
</script>
