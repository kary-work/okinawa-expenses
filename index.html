<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>沖繩記帳 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0ede8;
  --white: #ffffff;
  --card: #ffffff;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a18;
  --muted: #7a7870;
  --accent: #1a5c3a;
  --accent-light: #e8f5ee;
  --accent2: #c0392b;
  --ocean: #0a4a6b;
  --yellow: #f5a623;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{background:var(--ocean);padding:1.25rem 1.25rem 3.5rem;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:50px;background:var(--bg);clip-path:ellipse(55% 50px at 50% 100%)}
.header-inner{position:relative;z-index:1}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem}
.header h1{font-size:1.3rem;font-weight:700;color:#fff}
.header-sub{font-size:.75rem;color:rgba(255,255,255,.6);letter-spacing:1px}
.budget-bar-wrap{margin-top:1rem}
.budget-label{display:flex;justify-content:space-between;font-size:.72rem;color:rgba(255,255,255,.7);margin-bottom:.4rem}
.budget-bar{height:6px;background:rgba(255,255,255,.2);border-radius:50px;overflow:hidden}
.budget-fill{height:100%;background:#fff;border-radius:50px;transition:width .5s ease}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:.5px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:.6rem .25rem .5rem;cursor:pointer;font-size:.65rem;color:var(--muted);gap:3px;transition:color .15s}
.nav-item.on{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* PAGES */
.page{display:none;padding:1rem}
.page.show{display:block}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.stat-card{background:var(--card);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow)}
.stat-card.wide{grid-column:span 2}
.stat-label{font-size:.7rem;color:var(--muted);margin-bottom:.3rem}
.stat-value{font-size:1.5rem;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.stat-value.accent{color:var(--accent)}
.stat-sub{font-size:.7rem;color:var(--muted);margin-top:.2rem}
.stat-badge{display:inline-block;font-size:.65rem;padding:.15rem .5rem;border-radius:50px;margin-top:.3rem}

/* SECTION */
.section-title{font-size:.8rem;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:1.2rem 0 .6rem}

/* RECORDS LIST */
.record-card{background:var(--card);border-radius:var(--radius-sm);padding:.85rem 1rem;margin-bottom:.5rem;box-shadow:var(--shadow);display:flex;align-items:center;gap:.75rem}
.record-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.record-info{flex:1;min-width:0}
.record-title{font-size:.88rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-meta{font-size:.72rem;color:var(--muted);margin-top:.15rem}
.record-right{text-align:right;flex-shrink:0}
.record-amount{font-family:'DM Mono',monospace;font-size:.95rem;font-weight:500}
.record-who{font-size:.68rem;color:var(--muted);margin-top:.15rem}
.record-day-badge{display:inline-block;font-size:.65rem;padding:.1rem .4rem;border-radius:50px;background:var(--accent-light);color:var(--accent);margin-left:.3rem}

/* SCAN PAGE */
.scan-area{background:var(--card);border-radius:var(--radius);padding:1.5rem;text-align:center;box-shadow:var(--shadow);margin-bottom:1rem}
.upload-zone{border:2px dashed rgba(0,0,0,0.15);border-radius:var(--radius-sm);padding:2rem 1rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-light)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:2.5rem;margin-bottom:.5rem}
.upload-text{font-size:.88rem;color:var(--muted)}
.preview-img{width:100%;max-height:260px;object-fit:contain;border-radius:var(--radius-sm);margin-top:.75rem;display:none}

.ai-btn{width:100%;padding:.85rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.95rem;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.75rem;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s}
.ai-btn:hover{background:#154f31}
.ai-btn:disabled{background:#ccc;cursor:not-allowed}
.ai-btn .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.ai-btn.loading .spinner{display:block}
.ai-btn.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULT FORM */
.result-form{background:var(--card);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);margin-top:.75rem;display:none}
.result-form.show{display:block}
.form-row{margin-bottom:.85rem}
.form-row label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;border:.5px solid var(--border);border-radius:8px;padding:.55rem .8rem;font-size:.85rem;font-family:inherit;color:var(--text);background:var(--white);outline:none;transition:border-color .15s}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.form-row textarea{resize:none;height:64px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}

/* WHO PAYS */
.who-grid{display:flex;gap:.5rem;flex-wrap:wrap}
.who-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .75rem;border-radius:50px;border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .15s}
.who-btn.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.who-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}

/* CATEGORY CHIPS */
.cat-grid{display:flex;flex-wrap:wrap;gap:.4rem}
.cat-btn{padding:.3rem .7rem;border-radius:50px;border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:.75rem;font-family:inherit;transition:all .15s}
.cat-btn.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* SAVE BTN */
.save-btn{width:100%;padding:.8rem;background:var(--ocean);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.5rem}

/* CHARTS */
.chart-card{background:var(--card);border-radius:var(--radius);padding:1.1rem;box-shadow:var(--shadow);margin-bottom:.75rem}
.chart-title{font-size:.82rem;font-weight:500;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between}
.chart-wrap{position:relative;height:200px}

/* DAY SUMMARY */
.day-row{background:var(--card);border-radius:var(--radius-sm);padding:.75rem 1rem;margin-bottom:.5rem;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between}
.day-row-left{font-size:.85rem;font-weight:500}
.day-row-sub{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.day-row-amount{font-family:'DM Mono',monospace;font-weight:500;font-size:.95rem}

/* TOP 10 */
.top-row{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:.5px solid var(--border)}
.top-row:last-child{border-bottom:none}
.top-rank{font-size:.7rem;font-weight:700;color:var(--muted);width:18px;text-align:center;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-name{font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-cat{font-size:.68rem;color:var(--muted)}
.top-amount{font-family:'DM Mono',monospace;font-size:.85rem;font-weight:500;flex-shrink:0}

/* EMPTY STATE */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.empty-text{font-size:.88rem}

/* TOAST */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(40px);background:var(--text);color:#fff;padding:.55rem 1.2rem;border-radius:50px;font-size:.8rem;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* PERSONS SETUP */
.person-chip{display:flex;align-items:center;gap:.5rem;background:var(--card);border-radius:var(--radius-sm);padding:.6rem .9rem;margin-bottom:.5rem;box-shadow:var(--shadow)}
.person-chip .pa{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.person-chip .pn{font-size:.85rem;font-weight:500;flex:1}
.person-chip .del{font-size:16px;cursor:pointer;color:var(--muted)}

/* SETTINGS */
.setting-row{background:var(--card);border-radius:var(--radius-sm);padding:.85rem 1rem;margin-bottom:.5rem;box-shadow:var(--shadow)}
.setting-row label{font-size:.75rem;color:var(--muted);display:block;margin-bottom:.35rem}
.setting-row input{width:100%;border:.5px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.85rem;font-family:inherit;outline:none}
.setting-row input:focus{border-color:var(--accent)}

.export-btn{width:100%;padding:.7rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;font-family:inherit;font-size:.85rem;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;gap:.4rem}
.export-btn:hover{background:var(--bg)}

@media(max-width:380px){
  .stat-value{font-size:1.3rem}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <h1>🌊 沖繩記帳</h1>
        <div class="header-sub">2026.06.05 — 06.09</div>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:700;color:#fff" id="headerTotal">¥0</div>
    </div>
    <div class="budget-bar-wrap">
      <div class="budget-label">
        <span>預算使用</span>
        <span id="budgetPct">0%</span>
      </div>
      <div class="budget-bar"><div class="budget-fill" id="budgetFill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<!-- PAGES -->
<div class="page show" id="page-dashboard">
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">今日花費</div>
      <div class="stat-value accent" id="todayTotal">¥0</div>
      <div class="stat-sub" id="todayDay">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">旅程累計</div>
      <div class="stat-value" id="totalSpend">¥0</div>
      <div class="stat-sub" id="recordCount">0 筆記錄</div>
    </div>
    <div class="stat-card wide">
      <div class="stat-label">剩餘預算</div>
      <div class="stat-value" id="budgetLeft">¥0</div>
      <div style="margin-top:.5rem;height:4px;background:#f0ede8;border-radius:50px;overflow:hidden"><div id="dashBudgetBar" style="height:100%;background:var(--accent);border-radius:50px;transition:width .5s"></div></div>
    </div>
  </div>

  <div class="section-title">最近記錄</div>
  <div id="recentList"></div>
</div>

<div class="page" id="page-scan">
  <div class="scan-area">
    <div class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" capture="environment" id="fileInput" onchange="handleImage(event)">
      <div class="upload-icon">📷</div>
      <div class="upload-text">點擊拍照或上傳收據</div>
    </div>
    <img class="preview-img" id="previewImg">
    <button class="ai-btn" id="aiBtn" onclick="analyzeReceipt()" disabled>
      <div class="spinner"></div>
      <span class="btn-text">✨ AI 辨識收據</span>
    </button>
  </div>

  <div class="result-form" id="resultForm">
    <div class="section-title" style="margin-top:0">辨識結果（可修改）</div>
    <div class="form-2col">
      <div class="form-row"><label>日期</label><input type="date" id="fDate"></div>
      <div class="form-row"><label>時間</label><input type="time" id="fTime"></div>
    </div>
    <div class="form-row"><label>店家名稱</label><input type="text" id="fShop"></div>
    <div class="form-row"><label>金額（¥）</label><input type="number" id="fAmount" placeholder="0"></div>
    <div class="form-row"><label>品項說明</label><textarea id="fItems"></textarea></div>
    <div class="form-row">
      <label>消費類別</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <div class="form-row">
      <label>付款方式</label>
      <select id="fPayment">
        <option value="現金">現金</option>
        <option value="信用卡">信用卡</option>
        <option value="IC卡">IC卡（Suica）</option>
        <option value="PayPay">PayPay</option>
      </select>
    </div>
    <div class="form-row">
      <label>誰付錢</label>
      <div class="who-grid" id="whoGrid"></div>
    </div>
    <button class="save-btn" onclick="saveRecord()">💾 儲存這筆記錄</button>
  </div>
</div>

<div class="page" id="page-stats">
  <div class="chart-card">
    <div class="chart-title">每日花費趨勢</div>
    <div class="chart-wrap"><canvas id="chartDaily"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">類別佔比</div>
    <div class="chart-wrap"><canvas id="chartCat"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">支付方式分布</div>
    <div class="chart-wrap"><canvas id="chartPay"></canvas></div>
  </div>

  <div class="section-title">各天花費</div>
  <div id="dayList"></div>

  <div class="section-title">TOP 10 消費</div>
  <div class="chart-card" id="top10"></div>
</div>

<div class="page" id="page-records">
  <div id="allRecordsList"></div>
</div>

<div class="page" id="page-settings">
  <div class="section-title">旅行設定</div>
  <div class="setting-row">
    <label>總預算（¥）</label>
    <input type="number" id="sBudget" placeholder="例：100000" onchange="saveSetting()">
  </div>

  <div class="section-title">成員管理</div>
  <div id="personList"></div>
  <div style="display:flex;gap:.5rem;margin-bottom:1rem">
    <input type="text" id="newPersonName" placeholder="姓名" style="flex:1;border:.5px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-family:inherit;font-size:.85rem;outline:none">
    <input type="text" id="newPersonEmoji" placeholder="頭像" style="width:56px;border:.5px solid var(--border);border-radius:8px;padding:.5rem .5rem;font-family:inherit;font-size:.85rem;outline:none;text-align:center">
    <button onclick="addPerson()" style="padding:.5rem 1rem;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.85rem">新增</button>
  </div>

  <div class="section-title">資料管理</div>
  <div style="display:grid;gap:.5rem">
    <button class="export-btn" onclick="exportCSV()">📊 匯出 CSV</button>
    <button class="export-btn" onclick="exportJSON()">💾 備份資料（JSON）</button>
    <label class="export-btn" style="cursor:pointer">📂 還原備份 <input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
    <button class="export-btn" style="color:var(--accent2)" onclick="clearAll()">🗑️ 清除所有記錄</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item on" onclick="showPage('dashboard',this)"><div class="nav-icon">🏠</div>總覽</div>
  <div class="nav-item" onclick="showPage('scan',this)"><div class="nav-icon">📷</div>掃描</div>
  <div class="nav-item" onclick="showPage('stats',this)"><div class="nav-icon">📊</div>統計</div>
  <div class="nav-item" onclick="showPage('records',this)"><div class="nav-icon">📋</div>記錄</div>
  <div class="nav-item" onclick="showPage('settings',this)"><div class="nav-icon">⚙️</div>設定</div>
</div>

<div class="toast" id="toast"></div>

<script>
const GEMINI_KEY = 'AIzaSyD5ik2CU8VY23EqohC-76kzYA1kcpat6aE';

const TRIP_DAYS = [
  { day:1, date:'2026-06-05', label:'Day 1・那霸' },
  { day:2, date:'2026-06-06', label:'Day 2・北部' },
  { day:3, date:'2026-06-07', label:'Day 3・Parco City' },
  { day:4, date:'2026-06-08', label:'Day 4・南部' },
  { day:5, date:'2026-06-09', label:'Day 5・回程' },
];

const CATEGORIES = ['🍜 餐飲','🛍️ 購物','🚕 交通','🏖️ 景點','🏨 住宿','🍦 甜點','💊 藥妝','🎁 伴手禮','🎡 體驗','📦 其他'];

const CAT_COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#8bc34a'];

// STATE
let records = [];
let persons = [];
let settings = { budget: 100000 };
let currentImageB64 = null;
let selectedWho = null;
let selectedCat = null;
let chartDaily = null, chartCat = null, chartPay = null;

// INIT
function init() {
  records = JSON.parse(localStorage.getItem('oka_records') || '[]');
  persons = JSON.parse(localStorage.getItem('oka_persons') || '[]');
  settings = JSON.parse(localStorage.getItem('oka_settings') || '{"budget":100000}');
  if (persons.length === 0) {
    persons = [{ name:'我', emoji:'😊' }, { name:'旅伴', emoji:'🧡' }];
    savePersons();
  }
  renderAll();
  buildCatGrid();
  buildWhoGrid();
}

function saveRecords() { localStorage.setItem('oka_records', JSON.stringify(records)); }
function savePersons() { localStorage.setItem('oka_persons', JSON.stringify(persons)); }
function saveSetting() {
  settings.budget = parseInt(document.getElementById('sBudget').value) || 100000;
  localStorage.setItem('oka_settings', JSON.stringify(settings));
  renderAll();
}

// PAGES
function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('show');
  el.classList.add('on');
  if (name === 'stats') renderCharts();
  if (name === 'records') renderAllRecords();
  if (name === 'settings') renderSettings();
  if (name === 'dashboard') renderDashboard();
}

// RENDER ALL
function renderAll() {
  renderDashboard();
  updateHeader();
}

function updateHeader() {
  const total = records.reduce((s,r) => s + (r.amount||0), 0);
  document.getElementById('headerTotal').textContent = '¥' + total.toLocaleString();
  const pct = Math.min(100, Math.round(total / settings.budget * 100));
  document.getElementById('budgetPct').textContent = pct + '%';
  document.getElementById('budgetFill').style.width = pct + '%';
}

function renderDashboard() {
  updateHeader();
  const total = records.reduce((s,r) => s + (r.amount||0), 0);
  const today = new Date().toISOString().slice(0,10);
  const todayRecs = records.filter(r => r.date === today);
  const todayTotal = todayRecs.reduce((s,r) => s + (r.amount||0), 0);
  const dayInfo = TRIP_DAYS.find(d => d.date === today);

  document.getElementById('todayTotal').textContent = '¥' + todayTotal.toLocaleString();
  document.getElementById('todayDay').textContent = dayInfo ? dayInfo.label : '旅遊期間';
  document.getElementById('totalSpend').textContent = '¥' + total.toLocaleString();
  document.getElementById('recordCount').textContent = records.length + ' 筆記錄';
  const left = settings.budget - total;
  document.getElementById('budgetLeft').textContent = '¥' + Math.max(0,left).toLocaleString();
  const pct = Math.min(100, Math.round(total / settings.budget * 100));
  document.getElementById('dashBudgetBar').style.width = pct + '%';

  const recent = [...records].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,8);
  const el = document.getElementById('recentList');
  if (recent.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">還沒有記錄，掃描第一張收據吧！</div></div>`;
    return;
  }
  el.innerHTML = recent.map(r => recordCardHTML(r)).join('');
}

function recordCardHTML(r) {
  const catIdx = CATEGORIES.findIndex(c => c === r.category);
  const color = catIdx >= 0 ? CAT_COLORS[catIdx] : '#aaa';
  const dayInfo = TRIP_DAYS.find(d => d.date === r.date);
  const dayLabel = dayInfo ? `<span class="record-day-badge">${dayInfo.label}</span>` : '';
  const person = persons.find(p => p.name === r.who);
  const avatar = person ? person.emoji : '👤';
  return `<div class="record-card">
    <div class="record-icon" style="background:${color}22">${r.category ? r.category.split(' ')[0] : '📦'}</div>
    <div class="record-info">
      <div class="record-title">${r.shop || '未知店家'}${dayLabel}</div>
      <div class="record-meta">${r.date || ''} ${r.time || ''} · ${r.payment || ''}</div>
    </div>
    <div class="record-right">
      <div class="record-amount">¥${(r.amount||0).toLocaleString()}</div>
      <div class="record-who">${avatar} ${r.who || ''}</div>
    </div>
  </div>`;
}

// IMAGE & AI
function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.style.display = 'block';
    currentImageB64 = ev.target.result.split(',')[1];
    document.getElementById('aiBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

async function analyzeReceipt() {
  if (!currentImageB64) return;
  const btn = document.getElementById('aiBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  const prompt = `你是一個收據辨識助理。請分析這張收據圖片，回傳 JSON 格式，欄位如下：
{
  "shop": "店家名稱（翻譯成繁體中文）",
  "date": "YYYY-MM-DD 格式，如無法辨識填今天的日期",
  "time": "HH:MM 格式，如無法辨識填空字串",
  "amount": 數字（總金額，日圓，只填數字不含符號）,
  "items": "購買品項的繁體中文描述，用逗號分隔",
  "category": 從以下選一個最符合的：["🍜 餐飲","🛍️ 購物","🚕 交通","🏖️ 景點","🏨 住宿","🍦 甜點","💊 藥妝","🎁 伴手禮","🎡 體驗","📦 其他"]
}
只回傳 JSON，不要加任何說明文字。`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: 'image/jpeg', data: currentImageB64 } }
          ]
        }]
      })
    });
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const json = JSON.parse(text.replace(/```json|```/g,'').trim());
    fillForm(json);
    document.getElementById('resultForm').classList.add('show');
    showToast('✅ 辨識完成！請確認資料');
  } catch(e) {
    showToast('⚠️ 辨識失敗，請手動輸入');
    fillForm({});
    document.getElementById('resultForm').classList.add('show');
  }
  btn.classList.remove('loading');
  btn.disabled = false;
}

function fillForm(d) {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('fDate').value = d.date || today;
  document.getElementById('fTime').value = d.time || '';
  document.getElementById('fShop').value = d.shop || '';
  document.getElementById('fAmount').value = d.amount || '';
  document.getElementById('fItems').value = d.items || '';
  selectedCat = d.category || null;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.cat === selectedCat);
  });
}

function buildCatGrid() {
  document.getElementById('catGrid').innerHTML = CATEGORIES.map(c =>
    `<button class="cat-btn" data-cat="${c}" onclick="selectCat(this,'${c}')">${c}</button>`
  ).join('');
}

function selectCat(el, cat) {
  selectedCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('on', b.dataset.cat === cat));
}

function buildWhoGrid() {
  document.getElementById('whoGrid').innerHTML = persons.map(p =>
    `<button class="who-btn ${selectedWho===p.name?'on':''}" data-who="${p.name}" onclick="selectWho(this,'${p.name}')">
      <span class="who-avatar">${p.emoji}</span>${p.name}
    </button>`
  ).join('');
  if (!selectedWho && persons.length > 0) {
    selectedWho = persons[0].name;
    document.querySelector(`.who-btn[data-who="${selectedWho}"]`)?.classList.add('on');
  }
}

function selectWho(el, name) {
  selectedWho = name;
  document.querySelectorAll('.who-btn').forEach(b => b.classList.toggle('on', b.dataset.who === name));
}

function saveRecord() {
  const amount = parseInt(document.getElementById('fAmount').value);
  const shop = document.getElementById('fShop').value.trim();
  if (!shop || !amount) { showToast('請填寫店家名稱和金額'); return; }
  const r = {
    id: Date.now(),
    date: document.getElementById('fDate').value,
    time: document.getElementById('fTime').value,
    shop,
    amount,
    items: document.getElementById('fItems').value,
    category: selectedCat || '📦 其他',
    payment: document.getElementById('fPayment').value,
    who: selectedWho || (persons[0]?.name || '我'),
    createdAt: new Date().toISOString(),
  };
  records.unshift(r);
  saveRecords();
  renderAll();
  // reset
  document.getElementById('resultForm').classList.remove('show');
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('previewImg').src = '';
  document.getElementById('aiBtn').disabled = true;
  currentImageB64 = null;
  document.getElementById('fileInput').value = '';
  showToast('✅ 記錄已儲存！');
  showPage('dashboard', document.querySelectorAll('.nav-item')[0]);
}

// CHARTS
function renderCharts() {
  renderDailyChart();
  renderCatChart();
  renderPayChart();
  renderDayList();
  renderTop10();
}

function renderDailyChart() {
  const ctx = document.getElementById('chartDaily').getContext('2d');
  const labels = TRIP_DAYS.map(d => d.label.split('・')[0]);
  const vals = TRIP_DAYS.map(d => records.filter(r => r.date === d.date).reduce((s,r) => s+(r.amount||0),0));
  if (chartDaily) chartDaily.destroy();
  chartDaily = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data: vals, backgroundColor: '#0a4a6b', borderRadius: 8, barPercentage:.6 }] },
    options: { plugins:{legend:{display:false}}, scales:{ y:{ ticks:{ callback: v => '¥'+v.toLocaleString() }, grid:{color:'rgba(0,0,0,0.05)'} }, x:{grid:{display:false}} }, responsive:true, maintainAspectRatio:false }
  });
}

function renderCatChart() {
  const ctx = document.getElementById('chartCat').getContext('2d');
  const catTotals = {};
  records.forEach(r => { catTotals[r.category||'📦 其他'] = (catTotals[r.category||'📦 其他']||0) + (r.amount||0); });
  const labels = Object.keys(catTotals);
  const vals = Object.values(catTotals);
  if (chartCat) chartCat.destroy();
  chartCat = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: vals, backgroundColor: CAT_COLORS.slice(0,labels.length), borderWidth:0 }] },
    options: { plugins:{ legend:{ position:'right', labels:{ font:{size:11}, boxWidth:12 } } }, responsive:true, maintainAspectRatio:false }
  });
}

function renderPayChart() {
  const ctx = document.getElementById('chartPay').getContext('2d');
  const payTotals = {};
  records.forEach(r => { payTotals[r.payment||'現金'] = (payTotals[r.payment||'現金']||0) + (r.amount||0); });
  const labels = Object.keys(payTotals);
  const vals = Object.values(payTotals);
  if (chartPay) chartPay.destroy();
  chartPay = new Chart(ctx, {
    type: 'pie',
    data: { labels, datasets: [{ data: vals, backgroundColor:['#1a5c3a','#0a4a6b','#c0392b','#f5a623'], borderWidth:0 }] },
    options: { plugins:{ legend:{ position:'right', labels:{ font:{size:11}, boxWidth:12 } } }, responsive:true, maintainAspectRatio:false }
  });
}

function renderDayList() {
  const el = document.getElementById('dayList');
  el.innerHTML = TRIP_DAYS.map(d => {
    const dayRecs = records.filter(r => r.date === d.date);
    const total = dayRecs.reduce((s,r)=>s+(r.amount||0),0);
    return `<div class="day-row">
      <div class="day-row-left">${d.label}<div class="day-row-sub">${dayRecs.length} 筆</div></div>
      <div class="day-row-amount">¥${total.toLocaleString()}</div>
    </div>`;
  }).join('');
}

function renderTop10() {
  const el = document.getElementById('top10');
  const sorted = [...records].sort((a,b)=>(b.amount||0)-(a.amount||0)).slice(0,10);
  if (sorted.length === 0) { el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">尚無記錄</div></div>'; return; }
  el.innerHTML = sorted.map((r,i) =>
    `<div class="top-row">
      <div class="top-rank">${i+1}</div>
      <div class="top-info"><div class="top-name">${r.shop}</div><div class="top-cat">${r.category||''}</div></div>
      <div class="top-amount">¥${(r.amount||0).toLocaleString()}</div>
    </div>`
  ).join('');
}

function renderAllRecords() {
  const el = document.getElementById('allRecordsList');
  if (records.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">還沒有任何記錄</div></div>`;
    return;
  }
  const sorted = [...records].sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
  el.innerHTML = sorted.map(r => recordCardHTML(r)).join('');
}

// SETTINGS
function renderSettings() {
  document.getElementById('sBudget').value = settings.budget;
  renderPersonList();
}

function renderPersonList() {
  document.getElementById('personList').innerHTML = persons.map((p,i) =>
    `<div class="person-chip">
      <div class="pa" style="background:#f0ede8">${p.emoji}</div>
      <div class="pn">${p.name}</div>
      <div class="del" onclick="removePerson(${i})">✕</div>
    </div>`
  ).join('');
}

function addPerson() {
  const name = document.getElementById('newPersonName').value.trim();
  const emoji = document.getElementById('newPersonEmoji').value.trim() || '😊';
  if (!name) { showToast('請輸入姓名'); return; }
  persons.push({ name, emoji });
  savePersons();
  document.getElementById('newPersonName').value = '';
  document.getElementById('newPersonEmoji').value = '';
  renderPersonList();
  buildWhoGrid();
}

function removePerson(idx) {
  persons.splice(idx,1);
  savePersons();
  renderPersonList();
  buildWhoGrid();
}

// EXPORT
function exportCSV() {
  const headers = ['日期','時間','店家','金額','類別','品項','付款方式','付款人'];
  const rows = records.map(r => [r.date,r.time,r.shop,r.amount,r.category,r.items,r.payment,r.who].map(v => `"${v||''}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const bom = '\uFEFF';
  download(bom+csv, 'okinawa-records.csv', 'text/csv');
}

function exportJSON() {
  download(JSON.stringify({records,persons,settings},null,2), 'okinawa-backup.json', 'application/json');
}

function importJSON(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      records = d.records || [];
      persons = d.persons || persons;
      settings = d.settings || settings;
      saveRecords(); savePersons();
      localStorage.setItem('oka_settings', JSON.stringify(settings));
      renderAll(); renderSettings();
      showToast('✅ 備份還原成功');
    } catch { showToast('⚠️ 檔案格式錯誤'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearAll() {
  if (!confirm('確定要清除所有記錄嗎？')) return;
  records = []; saveRecords(); renderAll();
  showToast('已清除所有記錄');
}

function download(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = filename; a.click();
}

// TOAST
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
